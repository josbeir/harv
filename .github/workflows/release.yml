name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p harv-cli

      - name: Generate shell completions
        shell: bash
        run: |
          mkdir completions
          for shell in bash zsh fish; do
            ./target/${{ matrix.target }}/release/harv${{ matrix.ext }} completion $shell > completions/harv.$shell
          done
          tar -czf harv-completions-${{ matrix.target }}.tar.gz -C completions .

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf harv-${{ github.ref_name }}-${{ matrix.target }}.tar.gz harv${{ matrix.ext }}

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/${{ matrix.target }}/release/harv-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            harv-completions-${{ matrix.target }}.tar.gz
