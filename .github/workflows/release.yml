name: Release

on:
  push:
    tags: ['v*']

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            name: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            name: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p harv-cli

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf harv-${{ github.ref_name }}-${{ matrix.name }}.tar.gz harv${{ matrix.ext }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/harv-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
